name: CI Pipeline - Train Model

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas joblib

    - name: Train model with MLflow
      run: |
        export MLFLOW_TRACKING_URI="file:$(pwd)/MLProject/mlruns"
        mlflow run MLProject --env-manager=local --experiment-name diabetes_ci_pipeline

    - name: Upload model artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: MLProject/model/
        retention-days: 30

    - name: Commit model artifact
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add MLProject/model/ MLProject/mlflow_run_id.txt
        git diff --quiet && git diff --staged --quiet || \
          git commit -m "Auto: Update trained model artifact"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
        git push

    - name: Build Docker image
      run: |
        RUN_ID=$(cat MLProject/mlflow_run_id.txt)
        export MLFLOW_TRACKING_URI="file:$(pwd)/MLProject/mlruns"
        pip install mlflow==2.19.0
        mlflow artifacts download --run-id "$RUN_ID" --artifact-path "model" --dst-path ./docker-model
        cat > Dockerfile << 'DEOF'
        FROM python:3.12-slim
        RUN pip install mlflow==2.19.0 scikit-learn pandas joblib
        COPY docker-model /opt/ml/model
        ENV MLFLOW_DISABLE_ENV_CREATION=True
        ENTRYPOINT ["mlflow", "models", "serve", "-m", "/opt/ml/model", "-p", "8080", "--host", "0.0.0.0"]
        DEOF
        docker build -t hildanku/diabetes-model:latest .

    - name: Push Docker image to Docker Hub
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        docker push hildanku/diabetes-model:latest
