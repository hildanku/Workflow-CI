name: CI Pipeline - Train Model

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas joblib

    - name: Train model with MLflow
      run: mlflow run MLProject --env-manager=local

    - name: Upload model artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: MLProject/model/
        retention-days: 30

    - name: Commit model artifact
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add MLProject/model/ MLProject/mlflow_run_id.txt
        git diff --quiet && git diff --staged --quiet || \
          git commit -m "Auto: Update trained model artifact"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
        git push

    - name: Build Docker image
      run: |
        pip install mlflow==2.19.0
        mlflow models build-docker \
          --model-uri "runs:/$(cat MLProject/mlflow_run_id.txt)/model" \
          --name "hildanku/diabetes-model:latest"

    - name: Push Docker image to Docker Hub
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        docker push hildanku/diabetes-model:latest
